<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración - Ferretería G y M</title>
    <script src="sweetalert2.js"></script>
    <script src="sheetjs.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-image: linear-gradient(rgba(44, 62, 80, 0.8), rgba(255, 255, 255, 0.9)), url('https://images.unsplash.com/photo-1518709766631-a6a7f4593b6f?q=80&w=1600'); background-size: cover; background-attachment: fixed; background-position: center; }
        .encabezado { max-width: 1200px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid #2c3e50; padding-bottom: 15px; text-shadow: 1px 1px 2px rgba(255,255,255,0.5); }
        .encabezado h1 { color: #2c3e50; margin: 0; padding: 0; font-size: 2.2em; }
        .layout { display: flex; gap: 25px; max-width: 1200px; margin: 0 auto; align-items: flex-start; }
        .tabla-seccion { flex: 2; background-color: rgba(255, 255, 255, 0.9); padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow-x: auto; backdrop-filter: blur(5px); }
        .columna-derecha { flex: 1.1; display: flex; flex-direction: column; gap: 20px; height: 85vh; overflow-y: auto; padding-right: 5px; }
        .columna-derecha::-webkit-scrollbar { width: 8px; }
        .columna-derecha::-webkit-scrollbar-thumb { background: #bdc3c7; border-radius: 4px; }
        .panel-seccion { background-color: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); backdrop-filter: blur(5px); }
        
        .buscador-input { width: 100%; padding: 12px 15px; border: 2px solid #2c3e50; border-radius: 8px; box-sizing: border-box; font-size: 15px; margin-bottom: 15px; transition: box-shadow 0.3s; }
        .buscador-input:focus { outline: none; box-shadow: 0 0 10px rgba(44, 62, 80, 0.4); }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; font-size: 14px; }
        th { background-color: #2c3e50; color: white; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        tr:hover { background-color: #f6f8f9; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 7px; font-weight: bold; font-size: 13px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; transition: all 0.3s ease; }
        .form-group input:focus, .form-group select:focus { border-color: #2c3e50; box-shadow: 0 0 10px rgba(44, 62, 80, 0.2); outline: none; }
        
        .btn-accion { padding: 12px; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 14px; color: white; width: 100%; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.15); }
        .btn-accion:hover { transform: translateY(-3px); box-shadow: 0 7px 14px rgba(0,0,0,0.25); }
        .btn-naranja { background-color: #f39c12; } .btn-naranja:hover { background-color: #d68910; }
        .btn-azul { background-color: #3498db; } .btn-azul:hover { background-color: #2980b9; }
        .btn-morado { background-color: #9b59b6; } .btn-morado:hover { background-color: #8e44ad; }
        .btn-rojo { background-color: #e74c3c; } .btn-rojo:hover { background-color: #c0392b; }
        .btn-verde { background-color: #2ecc71; margin-bottom: 10px; } .btn-verde:hover { background-color: #27ae60; }
        .btn-salir { background-color: #e74c3c; width: auto; padding: 10px 20px; font-size: 13px; margin-top: 0;} .btn-salir:hover { background-color: #c0392b; }
        h2 { margin-top: 0; font-size: 17px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .swal-input-excel { width: 100%; box-sizing: border-box; border: 1px solid #ccc; padding: 5px; border-radius: 4px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="encabezado">
        <h1>👨‍💼 Panel de Administración - G y M</h1>
        <div style="display: flex; gap: 15px;">
            <button onclick="window.location.href='registros.html?origen=admin'" class="btn-accion" style="background-color: #34495e; color: white; width: auto; padding: 10px 20px; margin-top:0;">🧾 Ver Registros</button>
            <button id="btn-cerrar-sesion" class="btn-accion btn-salir" style="width: auto; padding: 10px 20px; margin-top:0;">👋 Cerrar Sesión</button>
        </div>
    </div>

    <div class="layout">
        <div class="tabla-seccion">
            <input type="text" id="buscador-tabla-admin" class="buscador-input" placeholder="🔍 Filtrar inventario por SKU o Nombre...">
            
            <table>
                <thead><tr><th>SKU</th><th>Producto</th><th>Stock Actual</th><th>Costo Compra</th><th>Precio Venta</th></tr></thead>
                <tbody id="cuerpo-tabla"><tr><td colspan="5" style="text-align: center;">Cargando base de datos...</td></tr></tbody>
            </table>
        </div>

        <div class="columna-derecha">
            <div class="panel-seccion" style="border-left: 6px solid #2ecc71; padding-bottom: 10px;">
                <h2 style="color: #2ecc71; margin-bottom: 15px;">📥 Importación Masiva</h2>
                <input type="file" id="input-excel" accept=".xlsx, .xls" style="display: none;">
                <button onclick="document.getElementById('input-excel').click()" class="btn-accion btn-verde">Subir archivo Excel</button>
                <p style="font-size: 11px; color: #7f8c8d; margin-top: 5px; text-align: center;">Cargue su inventario en formato .xlsx</p>
            </div>

            <div class="panel-seccion" style="border-left: 6px solid #f39c12;">
                <h2 style="color: #f39c12;">📦 Ingresar Stock (Proveedor)</h2>
                <form id="form-entradas">
                    <div class="form-group"><label>Producto:</label><select id="entrada-producto" required></select></div>
                    <div class="form-group"><label>Cantidad a Sumar:</label><input type="number" id="entrada-cantidad" min="0.01" step="0.01" placeholder="Ej. 10 o 0.5" required></div>
                    <button type="submit" class="btn-accion btn-naranja">Sumar al Inventario</button>
                </form>
            </div>

            <div class="panel-seccion" style="border-left: 6px solid #3498db;">
                <h2 style="color: #3498db;">➕ Crear Producto Nuevo</h2>
                <form id="form-nuevo-producto">
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;"><input type="text" id="nuevo-sku" placeholder="SKU" required></div>
                        <div class="form-group" style="flex: 2;"><input type="text" id="nuevo-nombre" placeholder="Nombre" required></div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;"><input type="number" id="nuevo-cantidad" min="0.01" step="0.01" placeholder="Cant." required></div>
                        <div class="form-group" style="flex: 1;"><input type="text" id="nuevo-unidad" placeholder="Unidad" required></div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;"><input type="number" id="nuevo-compra" step="0.01" placeholder="P. Compra" required></div>
                        <div class="form-group" style="flex: 1;"><input type="number" id="nuevo-venta" step="0.01" placeholder="P. Venta" required></div>
                    </div>
                    <button type="submit" class="btn-accion btn-azul">Guardar en Catálogo</button>
                </form>
            </div>

            <div class="panel-seccion" style="border-left: 6px solid #9b59b6;">
                <h2 style="color: #9b59b6;">✏️ Editar Inventario</h2>
                <form id="form-editar-producto">
                    <div class="form-group"><label>Modificar Producto:</label><select id="editar-producto" required></select></div>
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 2;"><label>Nombre:</label><input type="text" id="editar-nombre" required></div>
                        <div class="form-group" style="flex: 1;"><label>Unidad:</label><input type="text" id="editar-unidad" required></div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;"><label>Cant. Real:</label><input type="number" id="editar-cantidad" step="0.01" required></div>
                        <div class="form-group" style="flex: 1;"><label>P. Compra:</label><input type="number" id="editar-compra" step="0.01" required></div>
                        <div class="form-group" style="flex: 1;"><label>P. Venta:</label><input type="number" id="editar-venta" step="0.01" required></div>
                    </div>
                    <button type="submit" class="btn-accion btn-morado">Sobrescribir Datos</button>
                </form>
            </div>

            <div class="panel-seccion" style="border-left: 6px solid #e74c3c;">
                <h2 style="color: #e74c3c;">🗑️ Eliminar Definitivamente</h2>
                <form id="form-eliminar-producto">
                    <div class="form-group"><label>Producto a Borrar:</label><select id="eliminar-producto" required></select></div>
                    <button type="submit" class="btn-accion btn-rojo">Borrar Producto</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE URL PARA RENDER
        const API_URL = 'https://ferreteria-backend-cloud.onrender.com';

        const miToken = sessionStorage.getItem('token_gym');
        if (!miToken) { window.location.href = 'login.html'; }

        let catalogoAdmin = [];
        const urls = { 
            inventario: `${API_URL}/inventario`, 
            entradas: `${API_URL}/entradas`, 
            productos: `${API_URL}/productos` 
        };

        document.getElementById('btn-cerrar-sesion').addEventListener('click', () => {
            sessionStorage.removeItem('token_gym'); window.location.href = 'login.html';
        });

        async function cargarInventario() {
            try {
                const res = await fetch(urls.inventario);
                catalogoAdmin = await res.json(); 
                
                const tbody = document.getElementById('cuerpo-tabla');
                const selEntrada = document.getElementById('entrada-producto');
                const selEditar = document.getElementById('editar-producto');
                const selEliminar = document.getElementById('eliminar-producto');
                
                tbody.innerHTML = ''; selEntrada.innerHTML = '<option value="">Selecciona...</option>';
                selEditar.innerHTML = '<option value="">Selecciona...</option>'; selEliminar.innerHTML = '<option value="">Selecciona...</option>';

                catalogoAdmin.forEach(p => {
                    tbody.innerHTML += `<tr class="fila-producto"><td><strong>${p.sku}</strong></td><td>${p.nombre}</td>
                        <td style="font-weight: bold; color: ${p.cantidad_disponible < 15 ? '#e74c3c' : '#2ecc71'};">${p.cantidad_disponible} ${p.tipo_unidad}</td>
                        <td>C$ ${p.precio_compra}</td><td>C$ ${p.precio_venta}</td></tr>`;
                    
                    const opcion = `<option value="${p.id_producto}">${p.nombre} (Disp: ${p.cantidad_disponible})</option>`;
                    selEntrada.innerHTML += opcion; selEditar.innerHTML += opcion; selEliminar.innerHTML += opcion;
                });
            } catch (e) {
                Swal.fire({ title: 'Error', text: 'Fallo al conectar con la nube.', icon: 'error', confirmButtonColor: '#e74c3c' });
            }
        }

        document.getElementById('input-excel').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { defval: "" }); 
                if (jsonData.length === 0) return Swal.fire('Error', 'Excel vacío.', 'error');
                mostrarVistaPreviaExcel(jsonData);
            };
            reader.readAsArrayBuffer(file);
            this.value = '';
        });

        function mostrarVistaPreviaExcel(datos) {
            let html = `<div style="overflow-x: auto; max-height: 400px;"><table style="width: 100%; font-size: 12px;" id="tabla-preview-excel">
                <thead style="background: #2c3e50; color: white;"><tr><th>SKU</th><th>Nombre</th><th>Unidad</th><th>Cant</th><th>Compra</th><th>Venta</th></tr></thead><tbody>`;
            datos.forEach((row) => {
                html += `<tr class="fila-excel">
                    <td><input type="text" class="swal-input-excel" value="${row.SKU || ''}"></td>
                    <td><input type="text" class="swal-input-excel" value="${row.Nombre || ''}"></td>
                    <td><input type="text" class="swal-input-excel" value="${row.Unidad || 'Unidad'}"></td>
                    <td><input type="number" class="swal-input-excel" value="${row.Cantidad || 0}"></td>
                    <td><input type="number" class="swal-input-excel" value="${row.Compra || 0}"></td>
                    <td><input type="number" class="swal-input-excel" value="${row.Venta || 0}"></td>
                </tr>`;
            });
            html += `</tbody></table></div>`;

            Swal.fire({
                title: 'Vista Previa Excel',
                html: html,
                width: '850px',
                showCancelButton: true,
                confirmButtonText: 'Subir a Render',
                preConfirm: () => {
                    const productos = [];
                    document.querySelectorAll('.fila-excel').forEach(fila => {
                        const inputs = fila.querySelectorAll('input');
                        productos.push({
                            sku: inputs[0].value, nombre: inputs[1].value, tipo_unidad: inputs[2].value,
                            cantidad: parseFloat(inputs[3].value), precio_compra: parseFloat(inputs[4].value), precio_venta: parseFloat(inputs[5].value)
                        });
                    });
                    return productos;
                }
            }).then((result) => { if (result.isConfirmed) enviarCargaMasiva(result.value); });
        }

        async function enviarCargaMasiva(productosArray) {
            try {
                Swal.fire({ title: 'Cargando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const res = await fetch(`${API_URL}/productos/masivo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + miToken },
                    body: JSON.stringify(productosArray)
                });
                if (res.ok) { Swal.fire('¡Éxito!', 'Inventario actualizado.', 'success'); cargarInventario(); }
            } catch (error) { Swal.fire('Error', 'No se pudo subir.', 'error'); }
        }

        document.getElementById('buscador-tabla-admin').addEventListener('input', function() {
            const texto = this.value.toLowerCase();
            document.querySelectorAll('.fila-producto').forEach(fila => {
                fila.style.display = fila.textContent.toLowerCase().includes(texto) ? '' : 'none';
            });
        });

        document.getElementById('editar-producto').addEventListener('change', function() {
            const prod = catalogoAdmin.find(p => p.id_producto == this.value);
            if (!prod) return;
            document.getElementById('editar-nombre').value = prod.nombre;
            document.getElementById('editar-unidad').value = prod.tipo_unidad;
            document.getElementById('editar-cantidad').value = prod.cantidad_disponible;
            document.getElementById('editar-compra').value = prod.precio_compra;
            document.getElementById('editar-venta').value = prod.precio_venta;
        });

        document.getElementById('form-editar-producto').addEventListener('submit', async function(e) {
            e.preventDefault();
            try {
                const res = await fetch(`${urls.productos}/${document.getElementById('editar-producto').value}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + miToken },
                    body: JSON.stringify({
                        nombre: document.getElementById('editar-nombre').value, tipo_unidad: document.getElementById('editar-unidad').value,
                        cantidad_disponible: parseFloat(document.getElementById('editar-cantidad').value),
                        precio_compra: parseFloat(document.getElementById('editar-compra').value), precio_venta: parseFloat(document.getElementById('editar-venta').value)
                    })
                });
                if (res.ok) { Swal.fire('Actualizado', '', 'success'); cargarInventario(); }
            } catch (e) { }
        });

        document.getElementById('form-eliminar-producto').addEventListener('submit', async function(e) {
            e.preventDefault();
            const conf = await Swal.fire({ title: '¿Borrar?', showCancelButton: true });
            if (!conf.isConfirmed) return;
            try {
                const res = await fetch(`${urls.productos}/${document.getElementById('eliminar-producto').value}`, { 
                    method: 'DELETE', headers: { 'Authorization': 'Bearer ' + miToken } 
                });
                if (res.ok) { Swal.fire('Borrado', '', 'success'); cargarInventario(); }
            } catch (e) { }
        });

        document.getElementById('form-entradas').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            try {
                const res = await fetch(urls.entradas, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + miToken },
                    body: JSON.stringify({ id_producto: parseInt(document.getElementById('entrada-producto').value), cantidad_agregada: parseFloat(document.getElementById('entrada-cantidad').value), notas: "Admin" })
                });
                if (res.ok) { Swal.fire('Sumado', '', 'success'); cargarInventario(); } 
            } catch (e) {}
        });

        document.getElementById('form-nuevo-producto').addEventListener('submit', async function(e) {
            e.preventDefault();
            const prod = {
                sku: document.getElementById('nuevo-sku').value, nombre: document.getElementById('nuevo-nombre').value,
                descripcion: "-", id_categoria: 1, tipo_unidad: document.getElementById('nuevo-unidad').value, stock_minimo: 5,
                cantidad: parseFloat(document.getElementById('nuevo-cantidad').value),
                precio_compra: parseFloat(document.getElementById('nuevo-compra').value), precio_venta: parseFloat(document.getElementById('nuevo-venta').value)
            };
            try {
                const res = await fetch(urls.productos, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + miToken }, body: JSON.stringify(prod) });
                if (res.ok) { Swal.fire('Creado', '', 'success'); cargarInventario(); } 
            } catch (e) {}
        });

        cargarInventario();
    </script>
</body>
</html>
